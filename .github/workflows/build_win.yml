name: win-mqtt-build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    env:
      MQTT_INSTALL_DIR: ${{ github.workspace }}\cbuild
      OUTPUT_FILE: mqttkdb-win.tgz
      QHOME: ${{ github.workspace }}\qhome

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore cached mqtt lib
        id: cache-mqtt
        uses: actions/cache@v5
        with:
          path: |
            cbuild
          key: ${{ runner.os }}-MQTT-C-1.3.12
          restore-keys: |
            ${{ runner.os }}-MQTT-C-1.3.12

      - name: Install mqtt lib
        if: steps.cache-mqtt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          mkdir cbuild
          $uri = "https://github.com/eclipse-paho/paho.mqtt.c/releases/download/v1.3.12/eclipse-paho-mqtt-c-win64-1.3.12.zip"
          $out = "eclipse-paho-mqtt-c-win64-1.3.12.zip"
          Invoke-WebRequest -Uri $uri -OutFile $out
          7z x -ocbuild $out

      - name: Build 
        shell: pwsh
        run: |
          if (Test-Path cmake) { Remove-Item -Recurse -Force cmake }
          mkdir cmake 
          cd cmake
          cmake -G "Visual Studio 17 2022" ..
          cmake --build . --config Release
          cmake --build . --config Release --target install
          cd ..
          7z a -tzip -r "${{ env.OUTPUT_FILE }}" .\cmake\mqttkdb\*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kdbldap-win
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
