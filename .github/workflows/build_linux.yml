name: linux-mqtt-build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    env:
      MQTT_INSTALL_DIR: ${{ github.workspace }}/cbuild
      OUTPUT_FILE: mqttkdb-linux.tgz
      QHOME: ${{ github.workspace }}/qhome

    steps:
      - name: Install build tools
        run: |
          yum -y install \
            openssl-devel \
            gcc \
            make \
            cmake \
            wget \
            tar \
            gzip

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore cached mqtt lib
        if: steps.cache-mqtt.outputs.cache-hit != 'true'
        id: cache-mqtt
        uses: actions/cache@v5
        with:
          path: |
            cbuild/
          key: ${{ runner.os }}-MQTT-C-1.3.14
          restore-keys: |
            ${{ runner.os }}-MQTT-C-1.3.14

      - name: Install mqtt lib
        if: steps.cache-mqtt.outputs.cache-hit != 'true'
        run: |
          mkdir cbuild
          /bin/sh docker_linux/build_libpaho.sh
          tar xvf Eclipse-Paho-MQTT-C-1.3.14-Linux.tar.gz -C ./cbuild --strip-components=1

      - name: Build
        run: |
          mkdir cmake && cd cmake && cmake .. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_BUILD_TYPE=Release && cmake --build . --target install && cd .. && tar  -zcvf "$OUTPUT_FILE" -C cmake/mqttkdb .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kdbldap-linux
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml

